name: Build iStore OS 6.x

on:
  repository_dispatch:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to build'
        required: false
        default: 'main'

env:
  REPO_URL: https://github.com/istoreos/istoreos
  FEEDS_CONF: feeds.conf
  CONFIG_FILE: .config
  DIY_P1_SH: diy-part1-6.x.sh
  DIY_P2_SH: diy-part2-6.x.sh
  UPLOAD_BIN_DIR: 'true'
  UPLOAD_FIRMWARE: 'true'
  UPLOAD_RELEASE: 'true'
  TZ: Asia/Shanghai
  GITHUB_TOKEN: ${{ secrets.ACCESS_TOKEN }}

jobs:
  build:
    runs-on: self-hosted
    strategy:
      matrix:
        REPO_BRANCH:
          - istoreos-24.10
        ARCHITECTURE:
          - armv8
      fail-fast: false

    steps:
    # === self-hosted: Ubuntu 20核 ===
    # TODO: 回退时改为 runs-on: ubuntu-22.04
    # === self-hosted end ===

    - name: 准备完成
      uses: actions/checkout@main

    # 安装编译依赖（self-hosted Ubuntu 专用）
    - name: 安装编译依赖
      run: |
        sudo apt-get update
        sudo apt-get install -y $(cat $GITHUB_WORKSPACE/depends/ubuntu-22.04)
        echo "依赖安装完成"
        df -h

    - name: 检查服务器配置
      run: |
        echo "=== CPU ===" && nproc && lscpu | grep -E "Model name|CPU\(s\)|Thread|Core"
        echo "=== 内存 ===" && free -h
        echo "=== 磁盘 ===" && df -h

    - name: 克隆源码
      run: |
        df -hT .
        git clone $REPO_URL -b ${{ matrix.REPO_BRANCH }} openwrt
        echo "WORKDIR_PATH=$PWD" >> $GITHUB_ENV

    - name: 缓存构建动作
      uses: actions/cache@v4
      with:
        path: |
          ~/.cache/pip
          ~/.ccache
        key: self-hosted-${{ matrix.ARCHITECTURE }}-${{ matrix.REPO_BRANCH }}
        restore-keys: |
          self-hosted-${{ matrix.ARCHITECTURE }}-${{ matrix.REPO_BRANCH }}

    - name: 加载自定义 feeds
      env:
        FEEDS_CONF_PATH: ${{ matrix.ARCHITECTURE }}/${{ env.FEEDS_CONF }}
      run: |
        [ -e $FEEDS_CONF_PATH ] && mv $FEEDS_CONF_PATH openwrt/$FEEDS_CONF
        chmod +x $DIY_P1_SH
        cd openwrt
        $GITHUB_WORKSPACE/$DIY_P1_SH

    - name: 更新 feeds
      run: cd openwrt && ./scripts/feeds update -a

    - name: 安装 feeds
      run: cd openwrt && ./scripts/feeds install -a

    - name: 加载自定义配置
      env:
        CONFIG_FILE_PATH: ${{ matrix.ARCHITECTURE }}/${{ env.CONFIG_FILE }}
      run: |
        [ -e files ] && mv files openwrt/files
        [ -e $CONFIG_FILE_PATH ] && mv $CONFIG_FILE_PATH openwrt/$CONFIG_FILE
        chmod +x $DIY_P2_SH
        cd openwrt
        $GITHUB_WORKSPACE/$DIY_P2_SH

    - name: 下载软件包
      id: package
      run: |
        cd openwrt
        make defconfig
        make download -j8
        find dl -size -1024c -exec ls -l {} \;
        find dl -size -1024c -exec rm -f {} \;

    - name: 编译固件
      id: compile
      run: |
        cd openwrt
        echo "16 thread compile (self-hosted 20 cores)"
        make -j16 || make -j1 || make -j1 V=s
        echo "FILE_DATE=_$(date +"%Y%m%d%H%M")" >> $GITHUB_ENV
        echo "status=success" >> ${GITHUB_OUTPUT}

    - name: 检查磁盘空间
      if: (!cancelled())
      run: df -hT

    - name: 上传 bin 文件夹
      uses: actions/upload-artifact@main
      if: steps.compile.outputs.status == 'success' && env.UPLOAD_BIN_DIR == 'true'
      with:
        name: OpenWrt_bin${{ env.FILE_DATE }}
        path: openwrt/bin

    - name: 整理固件文件
      id: organize
      if: env.UPLOAD_FIRMWARE == 'true' && !cancelled()
      run: |
        cd openwrt/bin/targets/*/*
        rm -rf packages
        echo "FIRMWARE=$PWD" >> $GITHUB_ENV
        echo "status=success" >> ${GITHUB_OUTPUT}

    - name: 上传固件目录
      uses: actions/upload-artifact@main
      if: steps.organize.outputs.status == 'success' && !cancelled()
      with:
        name: OpenWrt_firmware${{ env.FILE_DATE }}
        path: ${{ env.FIRMWARE }}

    - name: 生成发布标签
      id: tag
      if: steps.compile.outputs.status == 'success' && env.UPLOAD_RELEASE == 'true' && !cancelled()
      run: |
        echo "release_tag=$(date +"%Y.%m.%d-%H.%M")-${{ matrix.ARCHITECTURE }}" >> ${GITHUB_OUTPUT}
        touch release.txt
        echo "
        💻 架构: ${{ matrix.ARCHITECTURE }}

        📂 源码: ${{ env.REPO_URL }}

        🌳 分支: ${{ matrix.REPO_BRANCH }}

        ⏱️ 编译时间: $(date +"%Y年%m月%d日%H时%M分")

        🌐 管理地址: 192.168.100.1

        👤 用户名: root

        🔒 密码: password

        📒 说明: NSY-G68-PLUS (RK3568) 双GMAC固件
        - eth0 = WAN (SGMII)
        - eth1/br-lan = LAN (RGMII + RTL8367S)
        - 4× LAN + 1× WAN
        - 无 WiFi（内核级关闭）
        " >> release.txt
        echo "status=success" >> ${GITHUB_OUTPUT}

    - name: 自动发布固件到 Releases
      uses: softprops/action-gh-release@v2
      if: steps.tag.outputs.status == 'success' && !cancelled()
      with:
        tag_name: ${{ steps.tag.outputs.release_tag }}
        body_path: release.txt
        files: ${{ env.FIRMWARE }}/*

    - name: 删除旧的 workflow runs
      if: always() && !cancelled()
      run: |
        gh run delete --repo ${{ github.repository }} --age 7days || true

    - name: 删除自动发布的旧固件
      uses: dev-drprasad/delete-older-releases@v0.3.3
      if: env.UPLOAD_RELEASE == 'true' && !cancelled()
      with:
        keep_latest: 60
        delete_tags: 'true'
